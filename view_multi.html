<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>R2 Storage Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0b0f;--surface:#12141a;--surface2:#1a1d26;--border:#252833;--accent:#4f8ef7;--accent2:#7c5ff5;--success:#3ecf8e;--danger:#f4645f;--warning:#f59e0b;--text:#e8eaf0;--muted:#6b7080;--mono:'JetBrains Mono',monospace;--sans:'Syne',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:1000;opacity:.4}
header{padding:20px 32px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:rgba(10,11,15,.95);backdrop-filter:blur(20px);position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:12px}
.burger-btn{background:none;border:none;cursor:pointer;padding:8px;border-radius:8px;display:flex;flex-direction:column;gap:5px;transition:background .2s}
.burger-btn:hover{background:var(--surface2)}
.burger-btn span{display:block;width:22px;height:2px;background:var(--text);border-radius:2px;transition:all .3s}
.burger-btn.active span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.burger-btn.active span:nth-child(2){opacity:0;transform:scaleX(0)}
.burger-btn.active span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
.logo-text{font-size:18px;font-weight:800;letter-spacing:-.5px}
.logo-text span{color:var(--accent)}
.header-status{font-family:var(--mono);font-size:11px;color:var(--muted);display:flex;align-items:center;gap:8px}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--success);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.app{display:grid;grid-template-columns:280px 1fr;min-height:calc(100vh - 65px)}
.sidebar{border-right:1px solid var(--border);padding:24px 16px;background:var(--surface);display:flex;flex-direction:column;gap:8px}
.sidebar-section-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding:0 12px;margin-top:8px;margin-bottom:4px}
.bucket-card{border-radius:12px;padding:14px 16px;cursor:pointer;transition:all .2s ease;border:1px solid transparent;position:relative;overflow:hidden}
.bucket-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--accent),var(--accent2));opacity:0;transition:opacity .2s;border-radius:12px}
.bucket-card:hover::before{opacity:.06}
.bucket-card.active{border-color:var(--accent);background:rgba(79,142,247,.08)}
.bucket-card.active::before{opacity:.1}
.bucket-name{font-weight:700;font-size:14px;display:flex;align-items:center;gap:8px;position:relative}
.bucket-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.bucket-meta{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:4px;padding-left:16px}
.bucket-count{font-family:var(--mono);font-size:10px;background:var(--border);padding:2px 7px;border-radius:20px;margin-left:auto}
.add-bucket-btn{margin-top:auto;padding:12px;border:1px dashed var(--border);border-radius:12px;background:none;color:var(--muted);cursor:pointer;font-family:var(--sans);font-size:13px;display:flex;align-items:center;gap:8px;justify-content:center;transition:all .2s}
.add-bucket-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(79,142,247,.05)}
.main{display:flex;flex-direction:column;overflow:hidden}
.toolbar{padding:16px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.bucket-title{font-size:22px;font-weight:800;letter-spacing:-.5px}
.bucket-url{font-family:var(--mono);font-size:11px;color:var(--muted);background:var(--surface);padding:4px 10px;border-radius:6px;border:1px solid var(--border);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:260px}
.btn{padding:9px 18px;border-radius:9px;border:none;cursor:pointer;font-family:var(--sans);font-size:13px;font-weight:600;display:flex;align-items:center;gap:7px;transition:all .2s;white-space:nowrap}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(79,142,247,.3)}
.btn-ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--border)}
.btn-danger{background:rgba(244,100,95,.12);color:var(--danger);border:1px solid rgba(244,100,95,.2)}
.btn-danger:hover{background:rgba(244,100,95,.2)}
.btn-sm{padding:6px 12px;font-size:12px}
.search-box{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:8px 14px;flex:1;min-width:180px;max-width:280px}
@media(max-width:768px){
  .folder-grid{grid-template-columns:repeat(2,1fr)!important}
  .file-grid:not(.list-view){grid-template-columns:repeat(2,1fr)!important}
}
@media(max-width:480px){
  .search-box{min-width:100px;max-width:none;flex:1}
  .btn span,.btn-text{display:none}
  .bucket-title{font-size:16px}
  .folder-grid{grid-template-columns:repeat(2,1fr)!important}
  .file-grid:not(.list-view){grid-template-columns:repeat(2,1fr)!important}
}
.search-box input{background:none;border:none;outline:none;color:var(--text);font-family:var(--sans);font-size:13px;width:100%}
.search-box input::placeholder{color:var(--muted)}
.view-toggle{display:flex;background:var(--surface2);border-radius:8px;border:1px solid var(--border);overflow:hidden}
.view-btn{padding:8px 12px;background:none;border:none;cursor:pointer;color:var(--muted);transition:all .2s;font-size:14px}
.view-btn.active{background:var(--border);color:var(--text)}
.content{flex:1;overflow-y:auto;padding:24px 28px}
.breadcrumb{font-family:var(--mono);font-size:12px;color:var(--muted);margin-bottom:20px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.breadcrumb-part{cursor:pointer;transition:color .15s}
.breadcrumb-part:hover{color:var(--accent)}
.breadcrumb-sep{color:var(--border)}
.stats-bar{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.stat-pill{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 16px;font-family:var(--mono);font-size:12px;display:flex;align-items:center;gap:8px}
.stat-val{font-weight:700;color:var(--accent)}
.section-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.folder-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;margin-bottom:28px}
.folder-item{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:all .2s;font-weight:600;font-size:13px}
.folder-item:hover{border-color:rgba(245,158,11,.5);background:rgba(245,158,11,.07);transform:translateY(-1px)}.folder-item:hover .act-btn{opacity:1!important}
.folder-actions{display:flex;gap:4px;margin-left:auto;flex-shrink:0}
.bucket-size-bar{margin-top:6px;padding-left:16px}
.bucket-size-label{font-family:var(--mono);font-size:10px;color:var(--muted)}
.account-group{margin-bottom:16px}
.account-header{display:flex;align-items:center;justify-content:space-between;padding:0 4px;margin-bottom:6px}
.account-name{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
.account-size{font-family:var(--mono);font-size:10px;color:var(--muted)}
.account-progress{height:3px;background:var(--border);border-radius:2px;margin:0 4px 8px;overflow:hidden}
.account-progress-bar{height:100%;border-radius:2px;transition:width .5s ease}
.folder-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.folder-arrow{color:var(--muted);font-size:14px;flex-shrink:0}
.file-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
.file-grid.list-view{display:flex;flex-direction:column;gap:4px}
.file-item{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:all .2s;position:relative}
.file-item:hover{border-color:rgba(79,142,247,.4);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.file-item.selected{border-color:var(--accent);background:rgba(79,142,247,.08)}
.file-check{position:absolute;top:8px;left:8px;width:18px;height:18px;border-radius:5px;border:1.5px solid var(--muted);background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2;opacity:0;transition:opacity .15s;font-size:10px}
.file-item:hover .file-check,.file-item.selected .file-check{opacity:1}
.file-item.selected .file-check{background:var(--accent);border-color:var(--accent);color:#fff}
.file-thumb{aspect-ratio:1;background:var(--surface2);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.file-thumb img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
.file-item:hover .file-thumb img{transform:scale(1.05)}
.file-thumb-icon{font-size:36px;opacity:.5}
.file-info{padding:10px}
.file-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.file-size{font-family:var(--mono);font-size:10px;color:var(--muted)}
.file-grid.list-view .file-item{border-radius:8px;display:flex;align-items:center;gap:12px;padding:10px 14px}
.file-grid.list-view .file-thumb{width:36px;height:36px;aspect-ratio:unset;border-radius:8px;flex-shrink:0}
.file-grid.list-view .file-thumb-icon{font-size:18px}
.file-grid.list-view .file-info{flex:1;padding:0;display:flex;align-items:center;gap:12px;min-width:0}
.file-grid.list-view .file-name{flex:1;font-size:13px;margin:0}
.file-date{font-family:var(--mono);font-size:10px;color:var(--muted);white-space:nowrap}
.file-actions-inline{display:flex;gap:6px;opacity:0;transition:opacity .15s}
.file-item:hover .file-actions-inline{opacity:1}
.act-btn{width:28px;height:28px;border-radius:7px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .15s}
.act-btn:hover{background:var(--border);color:var(--text)}
.act-btn.del:hover{background:rgba(244,100,95,.15);color:var(--danger);border-color:rgba(244,100,95,.3)}
.empty-state{text-align:center;padding:80px 40px;color:var(--muted)}
.empty-icon{font-size:56px;margin-bottom:16px;opacity:.3}
.empty-title{font-size:18px;font-weight:700;margin-bottom:8px;color:var(--text);opacity:.5}
.loading{display:flex;align-items:center;justify-content:center;gap:8px;padding:60px;color:var(--muted);font-family:var(--mono);font-size:13px}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast-container{position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column;gap:8px;z-index:9999}
.toast{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px 18px;font-size:13px;display:flex;align-items:center;gap:10px;min-width:260px;animation:slideIn .3s ease;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.toast.success{border-color:rgba(62,207,142,.3)}
.toast.error{border-color:rgba(244,100,95,.3)}
.toast.info{border-color:rgba(79,142,247,.3)}
@keyframes slideIn{from{transform:translateX(40px);opacity:0}to{transform:translateX(0);opacity:1}}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);z-index:500;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:32px;width:100%;max-width:480px;animation:slideUp .25s ease;box-shadow:0 24px 64px rgba(0,0,0,.5)}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-title{font-size:20px;font-weight:800;margin-bottom:24px;display:flex;align-items:center;gap:10px}
.modal-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px 16px;color:var(--text);font-family:var(--sans);font-size:14px;outline:none;transition:border-color .2s;margin-bottom:12px}
.modal-input:focus{border-color:var(--accent)}
.modal-input::placeholder{color:var(--muted)}
.modal-label{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;display:block}
.modal-actions{display:flex;gap:10px;margin-top:24px;justify-content:flex-end}
.dropzone{border:2px dashed var(--border);border-radius:14px;padding:40px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:16px}
.dropzone:hover,.dropzone.drag-over{border-color:var(--accent);background:rgba(79,142,247,.05)}
.dropzone-icon{font-size:40px;margin-bottom:12px;opacity:.5}
.dropzone p{font-size:14px;color:var(--muted);line-height:1.6}
.dropzone strong{color:var(--text)}
.upload-list{display:flex;flex-direction:column;gap:8px;max-height:200px;overflow-y:auto}
.upload-item{display:flex;align-items:center;gap:10px;background:var(--bg);border-radius:8px;padding:10px 12px;font-size:13px}
.upload-prog{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.upload-prog-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width .3s}
.preview-modal{max-width:90vw;max-height:90vh;background:var(--surface);border-radius:16px;padding:20px;display:flex;flex-direction:column;gap:12px;overflow:hidden}
.preview-modal img{max-width:80vw;max-height:70vh;object-fit:contain;border-radius:8px}
.preview-info{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.preview-url{font-family:var(--mono);font-size:11px;color:var(--muted);background:var(--bg);padding:6px 12px;border-radius:6px;border:1px solid var(--border);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer}
.preview-url:hover{color:var(--accent);border-color:rgba(79,142,247,.4)}
.bulk-bar{position:sticky;bottom:16px;display:flex;align-items:center;gap:10px;background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:10px 16px;margin-top:16px;box-shadow:0 8px 32px rgba(0,0,0,.4);animation:slideUp .2s ease}
.bulk-count{font-size:13px;font-weight:600;flex:1}
.auth-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9998}
.auth-box{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:40px;width:100%;max-width:380px;text-align:center;box-shadow:0 32px 80px rgba(0,0,0,.5)}
.auth-icon{font-size:48px;margin-bottom:16px}
.auth-title{font-size:24px;font-weight:800;margin-bottom:8px}
.auth-sub{font-size:13px;color:var(--muted);margin-bottom:28px;line-height:1.5}
.auth-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:14px 18px;color:var(--text);font-family:var(--sans);font-size:16px;outline:none;transition:border-color .2s;margin-bottom:12px;text-align:center;letter-spacing:3px}
.auth-input:focus{border-color:var(--accent)}
.auth-error{color:var(--danger);font-size:12px;margin-top:-4px;margin-bottom:8px}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--muted)}
@media(max-width:768px){
  .app{grid-template-columns:1fr}
  .sidebar{display:flex;position:fixed;top:0;left:0;bottom:0;z-index:200;transform:translateX(-100%);transition:transform .3s ease;width:280px;padding-top:70px}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:199;backdrop-filter:blur(4px)}
  .sidebar-overlay.open{display:block}
  .toolbar{padding:12px 16px}
  .content{padding:16px}
  .burger-btn{display:flex}
  .bucket-url{display:none}
}
@media(min-width:769px){
  .burger-btn{display:none}
  .sidebar-overlay{display:none!important}
}
</style>
</head>
<body>

<div class="auth-screen" id="authScreen">
  <div class="auth-box">
    <div class="auth-icon">🔐</div>
    <div class="auth-title">R2 Dashboard</div>
    <div class="auth-sub">Masukkan password untuk mengakses<br>R2 Storage Manager</div>
    <input type="password" class="auth-input" id="authInput" placeholder="••••••">
    <div class="auth-error" id="authError"></div>
    <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:4px" onclick="doAuth()">🚀 Masuk</button>
  </div>
</div>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<header>
  <div style="display:flex;align-items:center;gap:12px">
    <button class="burger-btn" onclick="toggleSidebar()" id="burgerBtn">
      <span></span><span></span><span></span>
    </button>
    <div class="logo">
      <div class="logo-icon">☁</div>
      <div class="logo-text">R2 <span>Manager</span></div>
    </div>
  </div>
  <div class="header-status">
    <div class="status-dot"></div>
    <span id="headerStatus">Siap</span>
  </div>
</header>

<div class="app">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-section-label">Bucket</div>
    <div id="bucketList"></div>
    <button class="add-bucket-btn" onclick="showAddBucket()">+ Tambah Bucket</button>
  </div>
  <div class="main">
    <div class="toolbar" id="toolbar">
      <div class="bucket-title" id="mainTitle">Pilih Bucket</div>
    </div>
    <div class="content" id="mainContent">
      <div class="empty-state">
        <div class="empty-icon">☁️</div>
        <div class="empty-title">Belum ada bucket dipilih</div>
        <div style="font-size:14px;margin-top:8px">Pilih bucket dari sidebar atau tambah bucket baru</div>
      </div>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>
<div id="modalContainer"></div>

<script>
const APP_PASSWORD='admin';
let buckets=[
  {id:'lidan',name:'Lidan',color:'#4f8ef7',apiUrl:'https://lidan.co.id/api/r2_api_lidan',publicUrl:'https://assets.lidan.co.id',password:'admin'},
  {id:'tabi',name:'Tabi',color:'#3ecf8e',apiUrl:'https://tabi.my.id/api/r2_api_tabi',publicUrl:'https://file.tabi.my.id',password:'admin'},
  {id:'mobeli',name:'Mobeli',color:'#f59e0b',apiUrl:'https://mobeli.my.id/api/r2_api_mobeli',publicUrl:'https://file.mobeli.my.id',password:'admin'},
  {id:'talentmap',name:'Talentmap',color:'#f4645f',apiUrl:'https://talentmap.my.id/api/r2_api_talentmap',publicUrl:'https://file.talentmap.my.id',password:'admin'},
  {id:'fam',name:'Fam Cipta',color:'#a78bfa',apiUrl:'https://cipta.my.id/api/r2_api_fam',publicUrl:'https://fam.cipta.my.id',password:'admin'},
  {id:'img',name:'Img Cipta',color:'#fb7185',apiUrl:'https://cipta.my.id/api/r2_api_img',publicUrl:'https://img.cipta.my.id',password:'admin'}
];
// Konfigurasi akun - bucket dalam 1 akun dijumlahkan
const accounts = [
  { id:'akun-lidan', name:'Akun Lidan', bucketIds:['lidan','fam','img'], limit: 10*1024*1024*1024 },
  { id:'akun-tabi',  name:'Akun Tabi',  bucketIds:['tabi'],             limit: 10*1024*1024*1024 },
  { id:'akun-mobeli',name:'Akun Mobeli',bucketIds:['mobeli'],           limit: 10*1024*1024*1024 },
  { id:'akun-talentmap',name:'Akun Talentmap',bucketIds:['talentmap'],  limit: 10*1024*1024*1024 },
];
let activeBucket=null,currentPrefix='',selectedFiles=new Set(),viewMode='grid',searchQuery='';
let bucketFileCounts={},bucketSizes={},folderCache={};

function doAuth(){
  const val=document.getElementById('authInput').value;
  if(val===APP_PASSWORD){
    sessionStorage.setItem('r2_auth','1');
    document.getElementById('authScreen').style.display='none';
    loadSavedBuckets();renderBucketList();
  }else{
    document.getElementById('authError').textContent='Password salah!';
    document.getElementById('authInput').style.borderColor='var(--danger)';
    setTimeout(()=>{document.getElementById('authError').textContent='';document.getElementById('authInput').style.borderColor='var(--border)';},2000);
  }
}

function saveBuckets(){localStorage.setItem('r2_buckets',JSON.stringify(buckets));}
function loadSavedBuckets(){try{const s=localStorage.getItem('r2_buckets');if(s)buckets=JSON.parse(s);}catch(e){}}

function renderBucketList(){
  let html='';
  accounts.forEach(acc=>{
    const accBuckets=buckets.filter(b=>acc.bucketIds.includes(b.id));
    if(!accBuckets.length)return;
    
    // Hitung total size akun ini
    const totalSize=acc.bucketIds.reduce((s,bid)=>s+(bucketSizes[bid]||0),0);
    const hasSize=acc.bucketIds.some(bid=>bucketSizes[bid]!==undefined);
    const pct=Math.min(100,(totalSize/acc.limit)*100);
    const pctColor=pct>90?'var(--danger)':pct>70?'var(--warning)':'var(--success)';
    
    html+=`<div class="account-group">
      <div class="account-header">
        <span class="account-name">${acc.name}</span>
        ${hasSize?`<span class="account-size">${formatSize(totalSize)} / 10 GB</span>`:''}
      </div>
      ${hasSize?`<div class="account-progress">
        <div class="account-progress-bar" style="width:${pct}%;background:${pctColor}"></div>
      </div>`:''}
      ${accBuckets.map(b=>`
        <div class="bucket-card ${activeBucket?.id===b.id?'active':''}" onclick="selectBucket('${b.id}')">
          <div class="bucket-name">
            <div class="bucket-dot" style="background:${b.color}"></div>${b.name}
            <div class="bucket-count">${bucketFileCounts[b.id]!==undefined?bucketFileCounts[b.id]:'—'}</div>
          </div>
          <div class="bucket-meta">${b.publicUrl.replace('https://','')}</div>
          ${bucketSizes[b.id]!==undefined?`<div class="bucket-size-label" style="padding-left:16px;margin-top:2px;font-family:var(--mono);font-size:10px;color:var(--muted)">${formatSize(bucketSizes[b.id])}</div>`:''}
        </div>`).join('')}

}

  renderBucketList();updateToolbar();await loadFolder('');
  if(window.innerWidth<=768)closeSidebar();

function updateToolbar(){
  if(!activeBucket)return;
  document.getElementById('mainTitle').innerHTML=`<span style="color:${activeBucket.color}">${activeBucket.name}</span>`;
  const tb=document.getElementById('toolbar');
  tb.querySelectorAll('.toolbar-dynamic').forEach(e=>e.remove());

async function loadFolder(prefix,forceRefresh=false){
  currentPrefix=prefix;selectedFiles.clear();
  const cacheKey=`${activeBucket.id}::${prefix}`;
  if(!forceRefresh&&folderCache[cacheKey]){renderFolderContent(folderCache[cacheKey],prefix);return;}
  showLoading();setStatus('Memuat...');
  try{
    const res=await fetch(`${activeBucket.apiUrl}?action=list&prefix=${encodeURIComponent(prefix)}`);
    if(!res.ok)throw new Error(`HTTP ${res.status}`);
    const data=await res.json();
    const result=Array.isArray(data)?{files:data,folders:[]}:data;
    folderCache[cacheKey]=result;
    if(prefix==='')updateBucketCount(activeBucket.id);
    setStatus(`${result.files.length} file · ${result.folders.length} folder`);
    renderFolderContent(result,prefix);
  }catch(e){
    showContent(`<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">Gagal terhubung</div><div style="font-size:13px;margin-top:8px;color:var(--danger)">${e.message}</div><div style="font-size:12px;margin-top:12px;color:var(--muted)">Pastikan API sudah di-deploy dan domain benar</div><button class="btn btn-ghost" style="margin:16px auto 0;display:flex" onclick="loadFolder('${prefix}',true)">↻ Coba lagi</button></div>`);
    setStatus('Error');
  }
}

async function refreshCurrent(){const k=`${activeBucket.id}::${currentPrefix}`;delete folderCache[k];await loadFolder(currentPrefix,true);}

async function updateBucketCount(bid){
  try{
    const b=buckets.find(x=>x.id===bid);
    const res=await fetch(`${b.apiUrl}?action=list&prefix=&recursive=true`);
    if(!res.ok)return;
    const data=await res.json();
    const files=Array.isArray(data)?data:(data.files||[]);
    bucketFileCounts[bid]=files.length;
    bucketSizes[bid]=files.reduce((s,f)=>s+(f.size||0),0);
    renderBucketList();
  }catch(e){}
}

function renderFolderContent(data,prefix){
  const{files,folders}=data;
  const q=searchQuery.toLowerCase();
  // Filter file placeholder tersembunyi (.keep, .folder, .gitkeep dll)
  const hiddenFiles = /^\.(keep|folder|gitkeep|gitignore|DS_Store)$/i;
  const visibleFiles = files.filter(f => {
    const name = f.key.split('/').pop();
    return !hiddenFiles.test(name);
  });
  // Filter folder duplikat (nama folder sama dengan prefix saat ini)
  const visibleFolders = folders.filter(f => {
    const name = f.key.replace(prefix,'').replace(/\/$/,'');
    // Sembunyikan jika nama folder sama dengan folder saat ini (duplikat)
    const currentFolderName = prefix.replace(/\/$/,'').split('/').pop();
    return name !== '' && name !== currentFolderName;
  });
  const ff=q?visibleFiles.filter(f=>f.key.toLowerCase().includes(q)):visibleFiles;
  const fld=q?visibleFolders.filter(f=>f.key.toLowerCase().includes(q)):visibleFolders;

  const parts=prefix.split('/').filter(Boolean);
  let bread=`<div class="breadcrumb"><span class="breadcrumb-part" onclick="loadFolder('')">🏠 root</span>`;
  let built='';
  parts.forEach(p=>{built+=p+'/';const path=built;bread+=`<span class="breadcrumb-sep">/</span><span class="breadcrumb-part" onclick="loadFolder('${path}')">${p}</span>`;});
  bread+='</div>';

  const totalSize=ff.reduce((s,f)=>s+(f.size||0),0);
  const stats=`<div class="stats-bar">
    <div class="stat-pill">📁 <span class="stat-val">${fld.length}</span> folder</div>
    <div class="stat-pill">📄 <span class="stat-val">${ff.length}</span> file</div>
    <div class="stat-pill">💾 <span class="stat-val">${formatSize(totalSize)}</span></div>
  </div>`;

  let foldersHtml='';
  if(fld.length>0){
    foldersHtml=`<div class="section-label">📁 Folder</div><div class="folder-grid">${
      fld.map(f=>{const name=f.key.replace(prefix,'').replace(/\/$/,'');const fk=f.key.replace(/'/g,"\\'");return`<div class="folder-item" onclick="loadFolder('${f.key}')"><span style="font-size:22px">📁</span><span class="folder-name">${name}</span><button class="act-btn del" style="opacity:0;transition:opacity .15s;flex-shrink:0" onmouseenter="this.style.opacity=1" onmouseleave="this.style.opacity=0" onclick="event.stopPropagation();confirmDeleteFolder('${fk}')" title="Hapus Folder">🗑️</button></div>`;}).join('')
    }</div>`;
  }

  let filesHtml='';
  if(ff.length>0){
    filesHtml=`<div class="section-label">📄 File</div><div class="file-grid ${viewMode==='list'?'list-view':''}">${ff.map(f=>renderFileItem(f,prefix)).join('')}</div>`;
  }

  if(fld.length===0&&ff.length===0){
    filesHtml=`<div class="empty-state"><div class="empty-icon">🗂️</div><div class="empty-title">${q?'Tidak ada hasil':'Folder kosong'}</div>${!q?`<button class="btn btn-primary" style="margin:16px auto 0;display:flex" onclick="showUpload()">⬆ Upload File</button>`:''}</div>`;
  }

  showContent(bread+stats+foldersHtml+filesHtml);
  if(selectedFiles.size>0)renderBulkBar();
}

function renderFileItem(f,prefix){
  const name=f.key.split('/').pop()||f.key;
  const isImg=/\.(jpg|jpeg|png|gif|webp|svg|bmp)$/i.test(name);
  const isSelected=selectedFiles.has(f.key);
  const sk=f.key.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  const su=f.url.replace(/'/g,"\\'");
  const thumb=isImg?`<img src="${f.url}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\\'file-thumb-icon\\'>${getFileIcon(name)}</div>'">`:`<div class="file-thumb-icon">${getFileIcon(name)}</div>`;
  if(viewMode==='grid'){
    return`<div class="file-item ${isSelected?'selected':''}" data-key="${f.key}">
      <div class="file-check" onclick="toggleSelect(event,'${sk}')">✓</div>
      <div class="file-thumb" onclick="openPreview('${sk}','${su}','${name}')">${thumb}</div>
      <div class="file-info"><div class="file-name" title="${name}">${name}</div><div class="file-size">${formatSize(f.size||0)}</div></div>
    </div>`;
  }else{
    const date=f.uploaded?new Date(f.uploaded).toLocaleDateString('id-ID'):'';
    return`<div class="file-item ${isSelected?'selected':''}" data-key="${f.key}">
      <div class="file-check" onclick="toggleSelect(event,'${sk}')">✓</div>
      <div class="file-thumb" onclick="openPreview('${sk}','${su}','${name}')">${thumb}</div>
      <div class="file-info">
        <div class="file-name" title="${f.key}">${f.key}</div>
        <div class="file-size">${formatSize(f.size||0)}</div>
        <div class="file-date">${date}</div>
        <div class="file-actions-inline">
          <button class="act-btn" onclick="copyUrl('${su}')" title="Copy URL">📋</button>
          <button class="act-btn" onclick="showRename('${sk}')" title="Rename">✏️</button>
          <button class="act-btn del" onclick="confirmDelete('${sk}')" title="Hapus">🗑️</button>
        </div>
      </div>
    </div>`;
  }
}

function setView(mode){
  viewMode=mode;
  document.querySelectorAll('.view-btn').forEach((b,i)=>b.classList.toggle('active',(mode==='grid'&&i===0)||(mode==='list'&&i===1)));

function toggleSelect(e,key){
  e.stopPropagation();
  if(selectedFiles.has(key))selectedFiles.delete(key);else selectedFiles.add(key);
  const item=document.querySelector(`[data-key="${key}"]`);
  if(item){item.classList.toggle('selected',selectedFiles.has(key));const c=item.querySelector('.file-check');if(c)c.style.opacity=selectedFiles.has(key)?'1':'';}
  const bar=document.getElementById('bulkBar');
  if(selectedFiles.size>0){if(!bar)renderBulkBar();else bar.querySelector('.bulk-count').textContent=`✓ ${selectedFiles.size} dipilih`;}

async function bulkDelete(){

  selectedFiles.clear();showToast(`${ok} file dihapus`,'success');await refreshCurrent();
}

function showRenameFolder(folderKey){
  const oldName=folderKey.replace(/\/$/,'').split('/').pop();
  const parentPrefix=folderKey.split('/').slice(0,-2).join('/')+(folderKey.split('/').length>2?'/':'');
  showModal(`<div class="modal-title">✏️ Rename Folder</div>
    <div class="modal-label">Nama folder saat ini</div>
    <div style="font-family:var(--mono);font-size:12px;color:var(--muted);background:var(--bg);padding:10px 14px;border-radius:8px;margin-bottom:16px;word-break:break-all">${folderKey}</div>
    <div class="modal-label">Nama baru</div>
    <input class="modal-input" id="newFolderNameInput" value="${oldName}" placeholder="nama-folder-baru">
    <div style="font-size:12px;color:var(--warning);background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);border-radius:8px;padding:10px 12px;margin-bottom:4px">
      ⚠️ Semua file di dalam folder akan dipindahkan. Proses ini bisa memakan waktu jika folder berisi banyak file.
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Batal</button>
      <button class="btn btn-primary" onclick="doRenameFolder('${folderKey}','${parentPrefix}')">✏️ Rename</button>
    </div>`);
  setTimeout(()=>document.getElementById('newFolderNameInput')?.focus(),100);
}

async function doRenameFolder(oldFolderKey, parentPrefix){
  const newName=document.getElementById('newFolderNameInput').value.trim();
  if(!newName){showToast('Nama folder tidak boleh kosong','error');return;}
  const newFolderKey=parentPrefix+newName+'/';
  if(newFolderKey===oldFolderKey){closeModal();return;}
  
  closeModal();
  setStatus('Memindahkan folder...');
  
  try{
    // Get all files in old folder recursively
    const res=await fetch(`${activeBucket.apiUrl}?action=list&prefix=${encodeURIComponent(oldFolderKey)}&recursive=true`);
    if(!res.ok)throw new Error(`HTTP ${res.status}`);
    const data=await res.json();
    const files=Array.isArray(data)?data:(data.files||[]);
    
    if(files.length===0){
      // Empty folder - just create new one with placeholder
      const fd=new FormData();
      fd.append('file',new Blob([''],{type:'text/plain'}),'.keep');
      fd.append('customName',newFolderKey+'.keep');
      await fetch(`${activeBucket.apiUrl}?action=upload`,{method:'POST',headers:{'X-Custom-Auth':activeBucket.password},body:fd});
    } else {
      // Rename all files: copy to new path then delete old
      let done=0;
      for(const f of files){
        const newKey=newFolderKey+f.key.slice(oldFolderKey.length);
        try{
          await apiPost('rename',{oldKey:f.key,newKey,keepOriginal:false});
          done++;
          setStatus(`Memindahkan ${done}/${files.length} file...`);
        }catch(e){}
      }
    }
    
    // Clear cache
    delete folderCache[`${activeBucket.id}::${oldFolderKey}`];
    delete folderCache[`${activeBucket.id}::${parentPrefix}`];
    delete folderCache[`${activeBucket.id}::${currentPrefix}`];
    
    showToast(`Folder berhasil direname ke "${newName}"!`,'success');
    await loadFolder(parentPrefix,true);
  }catch(e){
    showToast(`Gagal: ${e.message}`,'error');
    setStatus('Error');
  }
}

  showModal(`<div class="modal-title">📁 Buat Folder Baru</div>
    <div class="modal-label">Lokasi</div>
    <div style="font-family:var(--mono);font-size:12px;color:var(--muted);background:var(--bg);padding:10px 14px;border-radius:8px;margin-bottom:16px">${base||'/ (root)'}</div>
    <div class="modal-label">Nama Folder</div>
    <input class="modal-input" id="folderNameInput" placeholder="contoh: foto-2024" autofocus>
    <div style="font-size:12px;color:var(--muted);margin-top:-4px;margin-bottom:8px">Hanya huruf, angka, tanda hubung, dan garis bawah</div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Batal</button>
      <button class="btn btn-primary" onclick="doCreateFolder()">📁 Buat</button>
    </div>`);
  setTimeout(()=>document.getElementById('folderNameInput')?.focus(),100);
}

async function doCreateFolder(){
  const name=document.getElementById('folderNameInput').value.trim().replace(/\/+$/,'');
  if(!name){showToast('Nama folder tidak boleh kosong','error');return;}
  if(/[<>:"|?*\\]/.test(name)){showToast('Nama folder mengandung karakter tidak valid','error');return;}
  const placeholder=currentPrefix+name+'/.keep';
  const fd=new FormData();
  const emptyBlob=new Blob([''],{type:'text/plain'});
  fd.append('file',emptyBlob,'.keep');
  fd.append('customName',placeholder);
  try{
    const res=await fetch(`${activeBucket.apiUrl}?action=upload`,{method:'POST',headers:{'X-Custom-Auth':activeBucket.password},body:fd});
    if(!res.ok)throw new Error(`HTTP ${res.status}`);
    showToast(`Folder "${name}" berhasil dibuat!`,'success');
    closeModal();refreshCurrent();
  }catch(e){showToast(`Gagal: ${e.message}`,'error');}
}

      <div style="font-size:12px;color:var(--danger);font-weight:700;margin-bottom:8px">⚠️ TIDAK DAPAT DIBATALKAN</div>

      <div style="font-family:var(--mono);font-size:13px;color:var(--warning);margin:6px 0"><strong>${name}</strong></div>

    </div>`);

function checkDeleteFolderConfirm(name){
  const val=document.getElementById('deleteFolderConfirm').value;
  const btn=document.getElementById('deleteFolderBtn');
  if(btn){
    const match=val===name;
    btn.disabled=!match;
    btn.style.opacity=match?'1':'0.4';
    btn.style.cursor=match?'pointer':'not-allowed';
  }
}

async function doDeleteFolder(folderKey){
  setStatus('Menghapus folder...');
  try{
    // Get all files in folder (recursive)
    const res=await fetch(`${activeBucket.apiUrl}?action=list&prefix=${encodeURIComponent(folderKey)}&recursive=true`);
    if(!res.ok)throw new Error(`HTTP ${res.status}`);
    const data=await res.json();
    const files=Array.isArray(data)?data:(data.files||[]);
    
    // Also get files via non-recursive to catch subfolders
    let allKeys=[...files.map(f=>f.key)];
    
    // Delete all
    let ok=0;
    for(const key of allKeys){
      try{await apiPost('delete',{key});ok++;}catch(e){}
    }
    const folderName=folderKey.replace(/\/$/,'').split('/').pop();
    showToast(`Folder "${folderName}" dihapus (${ok} file)`, 'success');
    closeModal();
    // Clear cache for parent
    const parentPrefix=folderKey.split('/').slice(0,-2).join('/')+(folderKey.split('/').length>2?'/':'');
    delete folderCache[`${activeBucket.id}::${parentPrefix}`];
    delete folderCache[`${activeBucket.id}::${folderKey}`];
    await loadFolder(currentPrefix,true);
  }catch(e){showToast(`Gagal: ${e.message}`,'error');}
}

function showUpload(){
  let uploadFiles=[];
  showModal(`<div class="modal-title">⬆️ Upload File</div>
    <div class="dropzone" id="dropzone" onclick="document.getElementById('fileInput').click()">
      <div class="dropzone-icon">📂</div>
      <p><strong>Klik untuk pilih file</strong> atau drag & drop</p>
      <p style="margin-top:6px;font-size:12px">Semua format didukung</p>
    </div>
    <input type="file" id="fileInput" multiple style="display:none" onchange="handleFileSelect(event)">
    <div class="modal-label">Folder tujuan</div>
    <input class="modal-input" id="uploadFolder" placeholder="contoh: gambar/2024" value="${currentPrefix}">
    <div class="upload-list" id="uploadList"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Batal</button>
      <button class="btn btn-primary" id="startUploadBtn" onclick="startUpload()" style="display:none">⬆ Upload</button>
    </div>`);
  setTimeout(()=>{
    const dz=document.getElementById('dropzone');if(!dz)return;
    dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag-over');});
    dz.addEventListener('dragleave',()=>dz.classList.remove('drag-over'));
    dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag-over');handleFiles(Array.from(e.dataTransfer.files));});
  },100);
  window.handleFileSelect=e=>handleFiles(Array.from(e.target.files));
  window.handleFiles=files=>{
    uploadFiles=files;
    document.getElementById('uploadList').innerHTML=files.map((f,i)=>`
      <div class="upload-item" id="uploadItem${i}">
        <span>${getFileIcon(f.name)}</span>
        <span style="flex:1;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${f.name}</span>
        <span style="font-size:11px;color:var(--muted)">${formatSize(f.size)}</span>
        <div class="upload-prog"><div class="upload-prog-bar" id="prog${i}" style="width:0%"></div></div>
      </div>`).join('');
    document.getElementById('startUploadBtn').style.display='flex';
  };
  window.startUpload=async()=>{
    const folder=document.getElementById('uploadFolder').value.trim();
    const base=folder?(folder.endsWith('/')?folder:folder+'/'):'';
    document.getElementById('startUploadBtn').disabled=true;
    let ok=0;
    for(let i=0;i<uploadFiles.length;i++){
      const file=uploadFiles[i];const fd=new FormData();
      fd.append('file',file);fd.append('customName',base+file.name);
      try{
        const res=await fetch(`${activeBucket.apiUrl}?action=upload`,{method:'POST',headers:{'X-Custom-Auth':activeBucket.password},body:fd});
        const prog=document.getElementById(`prog${i}`);
        if(res.ok){prog.style.width='100%';prog.style.background='var(--success)';ok++;}
        else throw new Error();
      }catch(e){const prog=document.getElementById(`prog${i}`);if(prog){prog.style.width='100%';prog.style.background='var(--danger)';}}
    }
    showToast(`${ok}/${uploadFiles.length} file diupload`,ok>0?'success':'error');
    setTimeout(()=>{closeModal();refreshCurrent();},800);
  };
}

function showRename(key){
  const name=key.split('/').pop();
  showModal(`<div class="modal-title">✏️ Rename File</div>
    <div class="modal-label">Path saat ini</div>
    <div style="font-family:var(--mono);font-size:12px;color:var(--muted);background:var(--bg);padding:10px 14px;border-radius:8px;margin-bottom:16px;word-break:break-all">${key}</div>
    <div class="modal-label">Nama baru</div>
    <input class="modal-input" id="newNameInput" value="${name}">
    <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;color:var(--muted)">
      <input type="checkbox" id="keepOriginal"> Simpan file asli (copy)
    </label>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Batal</button>
      <button class="btn btn-primary" onclick="doRename('${key}')">✏️ Rename</button>
    </div>`);
}

async function doRename(oldKey){
  const newName=document.getElementById('newNameInput').value.trim();
  const keepOriginal=document.getElementById('keepOriginal').checked;
  if(!newName)return;
  const parts=oldKey.split('/');parts[parts.length-1]=newName;const newKey=parts.join('/');
  try{await apiPost('rename',{oldKey,newKey,keepOriginal});showToast('File berhasil direname','success');closeModal();refreshCurrent();}
  catch(e){showToast(`Gagal: ${e.message}`,'error');}
}

function confirmDelete(key){
  showModal(`<div class="modal-title">🗑️ Hapus File</div>
    <div style="font-size:14px;color:var(--muted);margin-bottom:8px">Hapus file ini?</div>
    <div style="font-family:var(--mono);font-size:12px;background:var(--bg);padding:12px 16px;border-radius:10px;border:1px solid var(--border);word-break:break-all">${key}</div>
    <div style="font-size:13px;color:var(--danger);margin-top:12px">⚠️ Tidak dapat dibatalkan!</div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Batal</button>
      <button class="btn btn-danger" onclick="doDelete('${key}')">🗑 Hapus</button>
    </div>`);
}

async function doDelete(key){
  try{await apiPost('delete',{key});showToast('File dihapus','success');closeModal();refreshCurrent();}
  catch(e){showToast(`Gagal: ${e.message}`,'error');}
}

function showAddBucket(){
  showModal(`<div class="modal-title">➕ Tambah Bucket</div>
    <div class="modal-label">Nama</div><input class="modal-input" id="nb_name" placeholder="contoh: Produksi">
    <div class="modal-label">URL API</div><input class="modal-input" id="nb_api" placeholder="https://domain.com/api/r2_api_nama">
    <div class="modal-label">URL Public Asset</div><input class="modal-input" id="nb_public" placeholder="https://file.domain.com">
    <div class="modal-label">Password API</div><input class="modal-input" id="nb_pass" type="password" placeholder="admin">
    <div class="modal-label">Warna</div>
    <input type="color" id="nb_color" value="#4f8ef7" style="background:none;border:1px solid var(--border);border-radius:8px;padding:4px 8px;cursor:pointer;height:40px;width:100%;margin-bottom:12px">
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Batal</button>
      <button class="btn btn-primary" onclick="addBucket()">➕ Tambah</button>
    </div>`);
}

function addBucket(){
  const name=document.getElementById('nb_name').value.trim();
  const apiUrl=document.getElementById('nb_api').value.trim();
  const publicUrl=document.getElementById('nb_public').value.trim();
  const password=document.getElementById('nb_pass').value||'admin';
  const color=document.getElementById('nb_color').value;
  if(!name||!apiUrl||!publicUrl){showToast('Lengkapi semua field','error');return;}
  const id=name.toLowerCase().replace(/\s+/g,'-')+'-'+Date.now();
  buckets.push({id,name,color,apiUrl,publicUrl,password});
  saveBuckets();renderBucketList();closeModal();showToast(`Bucket "${name}" ditambahkan!`,'success');
}

async function apiPost(action,body){
  const res=await fetch(`${activeBucket.apiUrl}?action=${action}`,{method:'POST',headers:{'Content-Type':'application/json','X-Custom-Auth':activeBucket.password},body:JSON.stringify(body)});
  if(!res.ok){const err=await res.json().catch(()=>({error:`HTTP ${res.status}`}));throw new Error(err.error||`HTTP ${res.status}`);}
  return res.json();
}

function copyUrl(url){navigator.clipboard.writeText(url).then(()=>showToast('URL dikopi!','success')).catch(()=>showToast('Gagal kopi URL','error'));}
function showLoading(){showContent(`<div class="loading"><div class="spinner"></div> Memuat...</div>`);}
function showContent(html){document.getElementById('mainContent').innerHTML=html;}
function setStatus(msg){document.getElementById('headerStatus').textContent=msg;}
function showToast(msg,type='info'){
  const colors={success:'var(--success)',error:'var(--danger)',info:'var(--accent)'};
  const icons={success:'✓',error:'✕',info:'ℹ'};
  const el=document.createElement('div');el.className=`toast ${type}`;
  el.innerHTML=`<span style="color:${colors[type]};font-weight:700">${icons[type]}</span> ${msg}`;
  document.getElementById('toastContainer').appendChild(el);setTimeout(()=>el.remove(),3500);
}
function showModal(html,wide=false){
  closeModal();const overlay=document.createElement('div');
  overlay.className='modal-overlay';overlay.id='currentModal';
  overlay.innerHTML=wide?html:`<div class="modal">${html}</div>`;
  overlay.addEventListener('click',e=>{if(e.target===overlay)closeModal();});
  document.getElementById('modalContainer').appendChild(overlay);
}
function closeModal(){document.getElementById('currentModal')?.remove();}
function formatSize(bytes){if(!bytes)return'0 B';const k=1024,sizes=['B','KB','MB','GB'];const i=Math.floor(Math.log(bytes)/Math.log(k));return parseFloat((bytes/Math.pow(k,i)).toFixed(1))+' '+sizes[i];}
function toggleSidebar(){
  const sidebar=document.getElementById('sidebar');
  const overlay=document.getElementById('sidebarOverlay');
  const btn=document.getElementById('burgerBtn');
  sidebar.classList.toggle('open');
  overlay.classList.toggle('open');
  btn.classList.toggle('active');
}
function closeSidebar(){
  const sidebar=document.getElementById('sidebar');
  const overlay=document.getElementById('sidebarOverlay');
  const btn=document.getElementById('burgerBtn');
  sidebar.classList.remove('open');
  overlay.classList.remove('open');
  btn.classList.remove('active');
}

function getFileIcon(name){
  const ext=name.split('.').pop().toLowerCase();
  const icons={jpg:'🖼️',jpeg:'🖼️',png:'🖼️',gif:'🖼️',webp:'🖼️',svg:'🖼️',bmp:'🖼️',pdf:'📄',doc:'📝',docx:'📝',xls:'📊',xlsx:'📊',ppt:'📊',pptx:'📊',zip:'🗜️',rar:'🗜️','7z':'🗜️',mp4:'🎬',mov:'🎬',avi:'🎬',mkv:'🎬',mp3:'🎵',wav:'🎵',ogg:'🎵',js:'⚡',ts:'⚡',jsx:'⚡',html:'🌐',css:'🎨',json:'📋',xml:'📋',csv:'📋',txt:'📃',md:'📃'};
  return icons[ext]||'📁';
}
